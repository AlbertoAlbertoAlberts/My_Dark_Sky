<!-- Time Machine Section (Part 3) -->
<section id="time-machine-section" class="mb-8 hidden">
    <div class="glass-card p-6">
        <h3 class="text-lg font-medium mb-4 text-center text-gray-200">Time Machine</h3>

        <!-- Calendar -->
        <div class="flex justify-center mb-6">
            <div class="bg-dark-700/50 rounded-xl p-5 w-80 border border-gray-700/30">
                <div class="flex items-center justify-between mb-4">
                    <button id="cal-prev" class="text-gray-400 hover:text-white transition p-1.5 rounded-lg hover:bg-white/5">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <span id="cal-title" class="text-sm font-semibold text-gray-200"></span>
                    <button id="cal-next" class="text-gray-400 hover:text-white transition p-1.5 rounded-lg hover:bg-white/5">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
                <div class="grid grid-cols-7 text-center text-xs text-gray-500 mb-2 font-medium">
                    <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
                </div>
                <div id="cal-grid" class="grid grid-cols-7 text-center text-sm gap-1"></div>
            </div>
        </div>

        <!-- Historical weather results -->
        <div id="tm-results" class="hidden">
            <div id="tm-loading" class="text-center text-gray-400 py-8 hidden">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-teal-400 border-t-transparent"></div>
                <p class="mt-3 text-sm">Loading historical data...</p>
            </div>
            <div id="tm-data"></div>
        </div>
    </div>
</section>
